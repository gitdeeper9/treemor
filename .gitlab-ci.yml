# TREEMOR GitLab CI/CD Pipeline
# Stages: test, build, deploy

stages:
  - test
  - build
  - deploy
  - publish

variables:
  PYTHON_VERSION: "3.10"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_TAG_LATEST: $CI_REGISTRY_IMAGE:latest

# Cache Python packages
cache:
  paths:
    - .cache/pip
    - .venv/

# ============================================
# Test Stage
# ============================================
.python-test-template: &python-test
  stage: test
  image: python:$PYTHON_VERSION
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install pytest pytest-cov black flake8 mypy isort
    - pip install -e .
  script:
    - echo "Running code quality checks..."
    - black --check --line-length 88 treemor tests
    - isort --check-only --profile black treemor tests
    - flake8 --max-line-length=88 --extend-ignore=E203,W503 treemor tests
    - mypy treemor --ignore-missing-imports
    - echo "Running tests with coverage..."
    - pytest --cov=treemor --cov-report=term --cov-report=html tests/
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week

test-python-3.9:
  <<: *python-test
  image: python:3.9

test-python-3.10:
  <<: *python-test
  image: python:3.10

test-python-3.11:
  <<: *python-test
  image: python:3.11

# ============================================
# Build Stage
# ============================================
build-docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_TAG_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_TAG_LATEST
  only:
    - main
    - tags

build-pypi:
  stage: build
  image: python:$PYTHON_VERSION
  before_script:
    - pip install build twine
  script:
    - python -m build
    - twine check dist/*
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - tags

# ============================================
# Deploy Stage
# ============================================
deploy-dashboard:
  stage: deploy
  image: node:18
  before_script:
    - npm install -g netlify-cli
  script:
    - cd Netlify
    - netlify deploy --prod --dir=public --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
  only:
    - main
  environment:
    name: production
    url: https://treemor.netlify.app

deploy-docs:
  stage: deploy
  image: python:$PYTHON_VERSION
  before_script:
    - pip install -r docs/requirements.txt
    - pip install -e .
  script:
    - cd docs
    - make html
    - echo "Documentation built successfully"
  artifacts:
    paths:
      - docs/build/html/
    expire_in: 1 week
  only:
    - main
    - tags

# ============================================
# Publish Stage
# ============================================
publish-pypi:
  stage: publish
  image: python:$PYTHON_VERSION
  before_script:
    - pip install twine
  script:
    - twine upload dist/* --username __token__ --password $PYPI_TOKEN
  only:
    - tags
  environment:
    name: pypi
    url: https://pypi.org/project/treomor/

publish-zenodo:
  stage: publish
  image: python:$PYTHON_VERSION
  before_script:
    - pip install requests
  script:
    - python scripts/update_zenodo.py
  only:
    - tags
  variables:
    ZENODO_TOKEN: $ZENODO_TOKEN
    ZENODO_DOI: "10.5281/zenodo.19183878"
